<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Auth System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #4facfe;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00c6ff;
}

#logout {
  background: red;
}

#msg {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- 🔐 AUTH BOX -->
<div class="box" id="authBox">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button id="signup">Sign Up</button>
  <button id="login">Login</button>

  <p id="msg"></p>
</div>

<!-- 🎉 DASHBOARD -->
<div class="box" id="dashboard" style="display:none;">
  <h2>Welcome 🎉</h2>
  <p id="userEmail"></p>
  <button id="logout">Logout</button>
</div>

<script type="module">

// 🔥 Firebase CDN Imports (WORKS IN HTML)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBDs6mfan_OgqsQd6OhhXrHivLRIFJDmno",
  authDomain: "loginform-5e7bd.firebaseapp.com",
  databaseURL: "https://loginform-5e7bd-default-rtdb.firebaseio.com",
  projectId: "loginform-5e7bd",
  storageBucket: "loginform-5e7bd.firebasestorage.app",
  messagingSenderId: "496385502889",
  appId: "1:496385502889:web:465998f424dbf0029d03b8",
  measurementId: "G-RYS0N0DHLW"
};

// ✅ Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

// 🎯 UI Elements
const email = document.getElementById("email");
const password = document.getElementById("password");
const msg = document.getElementById("msg");

const authBox = document.getElementById("authBox");
const dashboard = document.getElementById("dashboard");
const userEmail = document.getElementById("userEmail");

// ✅ SIGNUP FUNCTION
document.getElementById("signup").onclick = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
  .then((userCredential) => {

    const user = userCredential.user;

    // 🔥 Save user in database
    set(ref(db, "users/" + user.uid), {
      email: user.email,
      uid: user.uid
    });

    msg.style.color = "green";
    msg.innerText = "Signup successful!";
  })
  .catch((error) => {
    msg.style.color = "red";
    msg.innerText = error.message;
  });
};

// ✅ LOGIN FUNCTION
document.getElementById("login").onclick = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
  .then(() => {
    msg.style.color = "green";
    msg.innerText = "Login successful!";
  })
  .catch((error) => {
    msg.style.color = "red";
    msg.innerText = error.message;
  });
};

// ✅ LOGOUT FUNCTION
document.getElementById("logout").onclick = () => {
  signOut(auth);
};

// ✅ AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    authBox.style.display = "none";
    dashboard.style.display = "block";
    userEmail.innerText = "Logged in as: " + user.email;
  } else {
    authBox.style.display = "block";
    dashboard.style.display = "none";
  }
});

</script>

</body>
</html>
